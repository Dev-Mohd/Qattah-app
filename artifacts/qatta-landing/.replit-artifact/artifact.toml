kind = "web"
previewPath = "/"
title = "قطّه — Landing Page"
version = "1.0.0"
id = "artifacts/qatta-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21047

[services.development]
run = "pnpm --filter @workspace/qatta-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qatta-landing", "run", "build" ]
publicDir = "artifacts/qatta-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21047"
BASE_PATH = "/"
